apiVersion: apps/v1
kind: Deployment
metadata:
  name: flick-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flick-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flick-worker
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 100
        runAsGroup: 100
        runAsNonRoot: true
        runAsUser: 100
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: docker.io/example/flick-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: flick-config
            - secretRef:
                name: flick-secrets
          env:
            - name: FLICK_WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: worker-data
              mountPath: /data
      volumes:
        - name: worker-data
          persistentVolumeClaim:
            claimName: flick-worker-data
