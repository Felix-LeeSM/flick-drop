# kube-state-metrics exposes pod-status metrics (kube_pod_status_phase,
# kube_pod_container_status_restarts_total, kube_pod_status_ready,
# kube_pod_status_reason, ...) in Prometheus text format for the flick cluster.
#
# Scoped to the pods collector only (--resources=pods) so RBAC stays read-only
# on a single object kind and memory stays small. Expand --resources and the
# ClusterRole together when more object kinds are needed (deployments, nodes).
#
# This is an opt-in add-on: it is NOT referenced by deploy/base/kustomization.yaml.
# Apply it separately after the base with `kubectl apply -k deploy/base/monitoring`.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-state-metrics
---
# Cluster-wide read on pods only. kube-state-metrics lists/watches pods across
# all namespaces; the binding subject is the ServiceAccount in the flick
# namespace (set by the kustomization).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-state-metrics
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-state-metrics
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-state-metrics
subjects:
  - kind: ServiceAccount
    name: kube-state-metrics
    namespace: flick
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-state-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-state-metrics
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kube-state-metrics
    spec:
      serviceAccountName: kube-state-metrics
      # Unlike the flick app pods, kube-state-metrics must reach the API server,
      # so it keeps its projected ServiceAccount token.
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kube-state-metrics
          # Pinned for reproducible rollouts; bump deliberately.
          image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.14.0
          imagePullPolicy: IfNotPresent
          args:
            - --resources=pods
            - --port=8080
            - --telemetry-port=8081
          ports:
            - name: http
              containerPort: 8080
            - name: telemetry
              containerPort: 8081
          # /livez lives on the metrics port; timeoutSeconds must exceed the
          # default 1s or a GC pause / in-flight scrape trips the probe and
          # crash-loops the pod. 5s matches the upstream KSM standard manifest.
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 5
            timeoutSeconds: 5
            periodSeconds: 20
          readinessProbe:
            # KSM serves /readyz on the telemetry port, not the metrics port.
            httpGet:
              path: /readyz
              port: telemetry
            initialDelaySeconds: 5
            timeoutSeconds: 5
            periodSeconds: 10
          # Measured ~42Mi RSS for the pods collector on a ~12-pod cluster;
          # request covers steady state, limit leaves Go GC headroom.
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 96Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
---
apiVersion: v1
kind: Service
metadata:
  name: kube-state-metrics
spec:
  selector:
    app.kubernetes.io/name: kube-state-metrics
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: telemetry
      port: 8081
      targetPort: telemetry
