apiVersion: apps/v1
kind: Deployment
metadata:
  name: flick-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flick-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flick-web
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 101
        runAsGroup: 101
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: docker.io/example/flick-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
            # Match api: the default 1s probe timeout crashloops healthy pods on
            # a loaded 1-vCPU node. See deploy/base/api.yaml.
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: flick-web
spec:
  selector:
    app.kubernetes.io/name: flick-web
  ports:
    - name: http
      port: 8080
      targetPort: http
