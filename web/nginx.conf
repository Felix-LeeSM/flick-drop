worker_processes auto;
pid /tmp/nginx.pid;

events {
	worker_connections 1024;
}

http {
	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	access_log /dev/stdout;
	error_log /dev/stderr warn;

	sendfile on;
	keepalive_timeout 65;

	client_body_temp_path /tmp/client_temp;
	proxy_temp_path /tmp/proxy_temp;
	fastcgi_temp_path /tmp/fastcgi_temp;
	uwsgi_temp_path /tmp/uwsgi_temp;
	scgi_temp_path /tmp/scgi_temp;

	server {
		listen 8080;
		server_name _;
		root /usr/share/nginx/html;
		index index.html;

		# Security response headers for the HTML app. nginx add_header inheritance
		# is replace-per-level, so they live at the server level and `location /`
		# (the HTML/SPA path) inherits them; a location that sets its own
		# add_header re-declares only what it still needs. HSTS is intentionally
		# absent — it belongs at the TLS-terminating ingress, not this plain :8080
		# pod (see docs/architecture/security-model.md).
		add_header X-Frame-Options "DENY" always;
		add_header X-Content-Type-Options "nosniff" always;
		add_header Referrer-Policy "no-referrer" always;
		add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
		# Content-Security-Policy is rendered at container start by the nginx
		# envsubst entrypoint so connect-src can carry the deployment's object-store
		# origin (FLICK_CSP_CONNECT_SRC). The glob never errors when empty, so the
		# pod still starts if the template is removed. See nginx-templates/.
		include /etc/nginx/snippets/*.conf;

		location = /healthz {
			access_log off;
			# default_type, not add_header: add_header Content-Type would emit a
			# second Content-Type alongside the inherited default.
			default_type text/plain;
			return 200 "ok\n";
		}

		location /_app/immutable/ {
			# Own add_header block, so server-level headers are not inherited here;
			# re-assert nosniff for the static assets. CSP/framing are moot on
			# sub-resources (they govern the HTML document, not its assets).
			add_header Cache-Control "public, max-age=31536000, immutable";
			add_header X-Content-Type-Options "nosniff" always;
			try_files $uri =404;
		}

		location / {
			try_files $uri $uri/ /200.html;
		}
	}
}
