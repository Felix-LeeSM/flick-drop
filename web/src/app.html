<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />

		<!-- Link preview. Static and brand-only: the /s/{id} shell is served to
		     crawlers without SSR, and secrets are E2E-encrypted + burn on open, so
		     no per-secret preview is possible or safe. A crawler fetching a link
		     never consumes it (burn happens only on the Open button's POST). -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Flick" />
		<meta property="og:title" content="Flick — one-time encrypted secret" />
		<meta
			property="og:description"
			content="An end-to-end encrypted link that burns after a single open."
		/>
		<meta property="og:image" content="%sveltekit.assets%/og.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Flick — one-time encrypted secret" />
		<meta
			name="twitter:description"
			content="An end-to-end encrypted link that burns after a single open."
		/>
		<meta name="twitter:image" content="%sveltekit.assets%/og.png" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
