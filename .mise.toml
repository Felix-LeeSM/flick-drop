[tools]
go = "1.24.7"
node = "24.15.0"
pnpm = "10.20.0"
direnv = "2.37.1"
sqlite = "3.53.2"
kubectl = "1.36.2"
kustomize = "5.8.1"

[env]
FLICK_ENV = "development"
FLICK_LOG_LEVEL = "debug"
FLICK_PUBLIC_BASE_URL = "http://localhost:5173"
PUBLIC_FLICK_API_BASE_URL = "http://localhost:8080"
PUBLIC_FLICK_LOCAL_FILE_MAX_BYTES = "1048560"
FLICK_API_BASE_URL = "http://localhost:8080"
FLICK_INTERNAL_API_BASE_URL = "http://localhost:8080"
FLICK_INTERNAL_TOKEN = "change-me-local"
FLICK_API_ADDR = ":8080"
FLICK_NATS_URL = "nats://127.0.0.1:4222"
FLICK_NATS_STREAM = "FLICK_JOBS"
FLICK_NATS_JOB_SUBJECT = "flick.jobs"
FLICK_DATA_DIR = "./var"
FLICK_API_DB_PATH = "./var/api.db"
FLICK_WORKER_DB_PATH = "./var/worker.db"
FLICK_PAYLOAD_INLINE_MAX_BYTES = "1048576"
FLICK_MAX_FILE_BYTES = "26214400"
FLICK_DEFAULT_TTL_SECONDS = "3600"
FLICK_ALLOWED_TTL_SECONDS = "600,3600,86400"
FLICK_STORAGE_LARGE_BACKEND = "disabled"
FLICK_WORKER_CONCURRENCY = "2"

[tasks.doctor]
description = "Show pinned tool versions and the resolved Flick environment"
run = "mise current && mise env --redacted"

[tasks.check]
description = "Run local CI checks"
run = "scripts/ci/all.sh"

[tasks.images]
description = "Build local container images"
run = "scripts/ci/images.sh"

[tasks.dev]
description = "Start local NATS, API, worker, and web dev servers"
run = "scripts/dev/up.sh"

[tasks.smoke-nats]
description = "Run the local NATS JetStream smoke test"
run = "scripts/ci/compose-nats-smoke.sh"

[tasks.smoke-k3d]
description = "Run the k3d smoke test when deploy manifests exist"
run = "scripts/ci/k3d-smoke.sh"

[tasks.nats-up]
description = "Start local NATS JetStream via compose"
run = "docker compose up -d nats"

[tasks.nats-down]
description = "Stop local NATS JetStream"
run = "docker compose down"
