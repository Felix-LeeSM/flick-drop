name: Review Gate

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review
      - labeled
      - unlabeled
      - milestoned
      - demilestoned

permissions:
  contents: read
  issues: read
  pull-requests: read
  statuses: write

jobs:
  review-gate:
    name: Review gate workflow
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Validate PR metadata
        id: validate
        continue-on-error: true
        run: scripts/ci/review-gate.sh

      - name: Publish Review gate status
        if: always()
        run: |
          if [ "${{ steps.validate.outcome }}" = "success" ]; then
            state="success"
            description="Review gate passed"
          else
            state="failure"
            description="Review gate failed"
          fi

          gh api -X POST "repos/$GH_REPO/statuses/$HEAD_SHA" \
            -f state="$state" \
            -f context="Review gate" \
            -f description="$description" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" >/dev/null

          if [ "$state" != "success" ]; then
            exit 1
          fi
